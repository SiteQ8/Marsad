services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marsad
      POSTGRES_PASSWORD: marsad
      POSTGRES_DB: marsad
    volumes:
      - marsad_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marsad"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://marsad:marsad@db:5432/marsad
      MARSAD_SECRET_KEY: ${MARSAD_SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  marsad_pgdata:
